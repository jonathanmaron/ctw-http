name: CI

on:
    push:
    pull_request:

jobs:
    tests:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: [ '8.5' ]
                dependencies: [ highest, lowest ]
                include:
                    # Forward-looking, non-blocking signal against the next PHP.
                    # This plugin exists to smooth installs on newer PHP, so an
                    # early-warning leg against the upcoming release fits its purpose.
                    -   php: '8.6'
                        dependencies: highest
                        experimental: true

        name: PHP ${{ matrix.php }} (${{ matrix.dependencies }})

        continue-on-error: ${{ matrix.experimental || false }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@v5

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php }}
                    extensions: fileinfo, libxml, posix, simplexml
                    coverage: xdebug
                    tools: composer:v2

            -   name: Validate composer.json
                run: composer validate --no-check-publish --no-interaction

            -   name: Get Composer cache directory
                id: composer-cache
                run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

            -   name: Cache Composer dependencies
                uses: actions/cache@v5
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-php${{ matrix.php }}-${{ matrix.dependencies }}-composer-${{ hashFiles('composer.json') }}
                    restore-keys: ${{ runner.os }}-php${{ matrix.php }}-${{ matrix.dependencies }}-composer-

            -   name: Install dependencies
                run: composer update --no-interaction --prefer-dist ${{ matrix.dependencies == 'lowest' && '--prefer-lowest' || '' }}

            -   name: Run tests
                run: XDEBUG_MODE=coverage vendor/bin/phpunit --coverage-text
